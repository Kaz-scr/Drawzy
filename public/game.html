<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawzy — Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-pixel-grid">

    <!-- ==================== WAITING ROOM OVERLAY ==================== -->
    <div class="overlay bg-pixel-grid" id="waitingOverlay">
        <div class="pixel-border-chunky waiting-card">
            <h2 class="waiting-title">WAITING ROOM</h2>
            <div class="room-code-display">
                <span class="room-code-label">Room Code:</span>
                <span class="room-code-value" id="waitingRoomCode">------</span>
                <button class="copy-btn" id="copyCodeBtn" title="Copy link">📋</button>
            </div>
            <div class="waiting-players" id="waitingPlayers"></div>
            <div class="settings-panel" id="settingsPanel" style="display:none;">
                <h3>SETTINGS</h3>
                <div class="setting-row">
                    <label>Rounds</label>
                    <div class="setting-control">
                        <button class="setting-btn" id="roundsDown">−</button>
                        <span class="setting-value" id="roundsValue">3</span>
                        <button class="setting-btn" id="roundsUp">+</button>
                    </div>
                </div>
                <div class="setting-row">
                    <label>Draw Time</label>
                    <div class="setting-control">
                        <button class="setting-btn" id="timeDown">−</button>
                        <span class="setting-value" id="timeValue">80s</span>
                        <button class="setting-btn" id="timeUp">+</button>
                    </div>
                </div>
            </div>
            <button class="pixel-button pixel-button-green btn-start hidden" id="btnStartGame">
                <span style="margin-right:8px;">🚀</span> START GAME
            </button>
            <p class="waiting-hint" id="waitingHint">Waiting for host to start...</p>
            <button class="pixel-button pixel-button-red" id="btnExitLobby" style="margin-top:16px; width:100%;">
                <span class="material-symbols-outlined" style="margin-right:8px;">logout</span> EXIT LOBBY
            </button>
        </div>
    </div>

    <!-- ==================== WORD PICKER OVERLAY ==================== -->
    <div class="overlay bg-pixel-grid hidden" id="wordPickerOverlay">
        <div class="pixel-border-chunky word-picker-card">
            <h2 class="word-picker-title">CHOOSE A WORD!</h2>
            <div class="pick-countdown" id="pickCountdownDrawer"></div>
            <div class="word-choices" id="wordChoices"></div>
        </div>
    </div>

    <!-- ==================== GAME OVER OVERLAY ==================== -->
    <div class="overlay bg-pixel-grid hidden" id="gameOverOverlay">
        <div class="pixel-border-chunky gameover-card">
            <h2 class="gameover-title">🏆 GAME OVER!</h2>
            <div class="podium" id="podium"></div>
            <div class="rankings-list" id="rankingsList"></div>
            <button class="pixel-button" id="btnPlayAgain">
                <span style="margin-right:8px;">🔄</span> PLAY AGAIN
            </button>
        </div>
    </div>

    <!-- ==================== MAIN GAME UI ==================== -->
    <div class="game-container hidden" id="gameContainer">
        <!-- Header -->
        <div class="game-header">
            <div class="header-left">
                <div class="timer-circle" id="timerCircle">
                    <svg viewBox="0 0 44 44">
                        <circle class="timer-bg" cx="22" cy="22" r="20"></circle>
                        <circle class="timer-progress" id="timerProgress" cx="22" cy="22" r="20"></circle>
                    </svg>
                    <span class="timer-text" id="timerText"></span>
                </div>
                <span class="round-info" id="roundInfo">Round 1 / 3</span>
            </div>
            <div class="header-center">
                <div class="word-display">
                    <span class="word-label" id="wordLabel"></span>
                    <span class="word-hint" id="wordHint">_ _ _ _ _</span>
                </div>
            </div>
            <div class="header-right">
                <button class="tool-btn tool-danger" id="btnLeaveGame" title="Leave Game">
                    <span class="material-symbols-outlined" style="font-size:18px;">logout</span>
                </button>
            </div>
        </div>

        <!-- Game Body -->
        <div class="game-body">
            <!-- Left: Players -->
            <div class="players-sidebar">
                <div class="players-list" id="playersList"></div>
            </div>

            <!-- Center: Canvas -->
            <div class="canvas-area">
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="drawCanvas" width="800" height="600"></canvas>
                    <!-- Turn end overlay -->
                    <div class="canvas-overlay hidden" id="turnEndOverlay">
                        <div class="turn-end-content">
                            <p class="turn-end-word">The word was: <strong id="revealedWord"></strong></p>
                        </div>
                    </div>
                    <!-- Picking info overlay (shown to guessers) -->
                    <div class="canvas-overlay hidden" id="pickingOverlay">
                        <div class="picking-info">
                            <div class="picking-avatar" id="pickingAvatar"></div>
                            <p class="picking-name" id="pickingName"></p>
                            <p class="picking-label">IS CHOOSING A WORD</p>
                            <div class="picking-timer" id="pickingTimer">15</div>
                        </div>
                    </div>
                </div>

                <!-- Drawing Toolbar -->
                <div class="toolbar hidden" id="toolbar">
                    <button class="color-preview" id="colorPreview" title="Colors"
                        style="background:#000000"></button>
                    <div class="size-picker">
                        <button class="tool-btn size-btn-main" id="sizeBtn" title="Brush size">
                            <span class="size-dot" id="sizeDot" style="width:8px;height:8px"></span>
                        </button>
                        <div class="size-popup hidden" id="sizePopup">
                            <button class="size-option" data-size="2"><span class="size-dot"
                                    style="width:4px;height:4px"></span></button>
                            <button class="size-option active" data-size="5"><span class="size-dot"
                                    style="width:8px;height:8px"></span></button>
                            <button class="size-option" data-size="10"><span class="size-dot"
                                    style="width:14px;height:14px"></span></button>
                            <button class="size-option" data-size="20"><span class="size-dot"
                                    style="width:20px;height:20px"></span></button>
                            <button class="size-option" data-size="32"><span class="size-dot"
                                    style="width:26px;height:26px"></span></button>
                        </div>
                    </div>
                    <div class="color-palette" id="colorPalette">
                        <button class="palette-color" data-color="#FFFFFF" style="background:#FFFFFF"
                            title="White"></button>
                        <button class="palette-color" data-color="#C1C1C1" style="background:#C1C1C1"
                            title="Light Gray"></button>
                        <button class="palette-color" data-color="#EF130B" style="background:#EF130B"
                            title="Red"></button>
                        <button class="palette-color" data-color="#FF7100" style="background:#FF7100"
                            title="Orange"></button>
                        <button class="palette-color" data-color="#FFE400" style="background:#FFE400"
                            title="Yellow"></button>
                        <button class="palette-color" data-color="#00CC00" style="background:#00CC00"
                            title="Green"></button>
                        <button class="palette-color" data-color="#00FF91" style="background:#00FF91"
                            title="Mint"></button>
                        <button class="palette-color" data-color="#00B2FF" style="background:#00B2FF"
                            title="Sky Blue"></button>
                        <button class="palette-color" data-color="#231FD3" style="background:#231FD3"
                            title="Sea Blue"></button>
                        <button class="palette-color" data-color="#A300BA" style="background:#A300BA"
                            title="Purple"></button>
                        <button class="palette-color" data-color="#DF69A7" style="background:#DF69A7"
                            title="Pink"></button>
                        <button class="palette-color" data-color="#FFAC8E" style="background:#FFAC8E"
                            title="Beige"></button>
                        <button class="palette-color" data-color="#A0522D" style="background:#A0522D"
                            title="Brown"></button>
                        <button class="palette-color active" data-color="#000000" style="background:#000000"
                            title="Black"></button>
                        <button class="palette-color" data-color="#505050" style="background:#505050"
                            title="Gray"></button>
                        <button class="palette-color" data-color="#740B07" style="background:#740B07"
                            title="Dark Red"></button>
                        <button class="palette-color" data-color="#C23800" style="background:#C23800"
                            title="Dark Orange"></button>
                        <button class="palette-color" data-color="#E8A200" style="background:#E8A200"
                            title="Dark Yellow"></button>
                        <button class="palette-color" data-color="#005510" style="background:#005510"
                            title="Dark Green"></button>
                        <button class="palette-color" data-color="#00785D" style="background:#00785D"
                            title="Dark Mint"></button>
                        <button class="palette-color" data-color="#00569E" style="background:#00569E"
                            title="Dark Sky Blue"></button>
                        <button class="palette-color" data-color="#0E0865" style="background:#0E0865"
                            title="Dark Sea Blue"></button>
                        <button class="palette-color" data-color="#550069" style="background:#550069"
                            title="Dark Purple"></button>
                        <button class="palette-color" data-color="#873554" style="background:#873554"
                            title="Dark Pink"></button>
                        <button class="palette-color" data-color="#CC774D" style="background:#CC774D"
                            title="Dark Beige"></button>
                        <button class="palette-color" data-color="#63300D" style="background:#63300D"
                            title="Dark Brown"></button>
                    </div>
                    <div class="tool-row main-tools">
                        <button class="tool-btn active" id="toolBrush" title="Brush">
                            <span class="material-symbols-outlined">brush</span>
                        </button>
                        <button class="tool-btn" id="toolEraser" title="Eraser">
                            <span class="material-symbols-outlined">ink_eraser</span>
                        </button>
                        <button class="tool-btn" id="toolFill" title="Fill">
                            <span class="material-symbols-outlined">format_color_fill</span>
                        </button>
                    </div>
                    <div class="tool-row">
                        <button class="tool-btn" id="toolUndo" title="Undo">
                            <span class="material-symbols-outlined">undo</span>
                        </button>
                        <button class="tool-btn tool-danger" id="toolClear" title="Clear">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Chat -->
            <div class="chat-sidebar">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Type your guess here..."
                        maxlength="80" autocomplete="off" spellcheck="false">
                    <button class="chat-send-btn" id="chatSendBtn">📨</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>

</html>
